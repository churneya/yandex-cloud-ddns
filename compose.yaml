services:
  yandex-cloud-ddns:
    image: ${DDNS_IMAGE:-ghcr.io/churneya/yandex-cloud-ddns:latest}
    container_name: yandex-cloud-ddns
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      start_period: 90s
      retries: 3
